    <text x="288" y="106" class="label">Command Fold</text>
    <text x="288" y="140" class="body">Abstract PDF mark with command/search</text>
    <text x="288" y="166" class="body">details. Best for a more branded,</text>
    <text x="288" y="192" class="body">less literal Mac utility icon.</text>
  </g>

