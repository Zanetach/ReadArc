    <text x="288" y="72" class="tag">OPTION B</text>
    <text x="288" y="106" class="label">Research Companion</text>
    <text x="288" y="140" class="body">Adds the app's agent/chat side panel</text>
    <text x="288" y="166" class="body">to the PDF page. Best if the product</text>
    <text x="288" y="192" class="body">should feel AI-assisted.</text>
  </g>

