    <text x="288" y="72" class="tag">OPTION A</text>
    <text x="288" y="106" class="label">Spotlight Reader</text>
    <text x="288" y="140" class="body">Most direct: page, highlighted match,</text>
    <text x="288" y="166" class="body">and search confirmation. Best for a</text>
    <text x="288" y="192" class="body">clear PDF reader identity.</text>
  </g>

