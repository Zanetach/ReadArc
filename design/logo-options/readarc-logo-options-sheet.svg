    <text x="288" y="72" class="tag">OPTION D</text>
    <text x="288" y="106" class="label">Library Compass</text>
    <text x="288" y="140" class="body">Stacks, bookmark, and navigation lens</text>
    <text x="288" y="166" class="body">lean into document library and research.</text>
    <text x="288" y="192" class="body">Best for repeated review workflows.</text>
