<svg width="1440" height="760" viewBox="0 0 1440 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 800 44px -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; fill: #101418; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; fill: #5E6672; }
      .label { font: 760 25px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; fill: #101418; }
      .body { font: 400 17px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; fill: #5E6672; }
      .tag { font: 760 13px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; fill: #3B4654; letter-spacing: 0.6px; }
      .tagDark { font: 760 13px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; fill: #C7D2E0; letter-spacing: 0.6px; }
    </style>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1440" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EAF0F7"/>
    </linearGradient>
    <linearGradient id="darkCard" x1="788" y1="188" x2="1348" y2="618" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <filter id="cardShadow" x="0" y="0" width="1440" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#25364D" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="1440" height="760" fill="url(#pageBg)"/>
  <text x="72" y="84" class="title">Option H, light and dark mode</text>
  <text x="72" y="123" class="subtitle">Use the light version for AppIcon by default. Use the dark version only for in-app brand surfaces that adapt to dark mode.</text>

  <g transform="translate(92 188)">
    <rect width="560" height="430" rx="28" fill="white" filter="url(#cardShadow)"/>
    <text x="42" y="62" class="tag">LIGHT APPICON</text>
    <image href="option-h-refined-citation-orbit.png" x="130" y="94" width="300" height="300"/>
  </g>

  <g transform="translate(788 188)">
    <rect width="560" height="430" rx="28" fill="url(#darkCard)" filter="url(#cardShadow)"/>
    <text x="42" y="62" class="tagDark">DARK MODE BRAND MARK</text>
    <image href="option-h-refined-dark-citation-orbit.png" x="130" y="94" width="300" height="300"/>
  </g>

  <text x="92" y="680" class="label">Recommendation</text>
  <text x="92" y="714" class="body">Keep one fixed AppIcon for macOS. Add the dark version only if AppLogoView or marketing surfaces need a dark-aware logo.</text>
</svg>
